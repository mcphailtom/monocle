version: 2

before:
  hooks:
    - sh -c "mkdir -p build && tar -czf build/skills.tar.gz --exclude='*.go' -C skills ."
    - go mod tidy
    - go mod download

builds:
  - id: monocle
    main: ./cmd/monocle
    binary: monocle
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}


archives:
  - id: monocle
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - '^build\(deps\):'
      - 'README'
      - Merge pull request
      - Merge branch

homebrew_casks:
  - name: monocle
    skip_upload: auto
    repository:
      owner: josephschmitt
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/josephschmitt/monocle
    description: "Terminal-based code review companion for AI coding agents"
    binaries:
      - monocle
    # Helps `brew audit` pass since releases are served from the GitHub
    # download domain rather than the homepage domain.
    url:
      verified: github.com/josephschmitt/monocle/
    # The release binaries are not code-signed / notarized, so strip the
    # com.apple.quarantine attribute on install — without this macOS
    # Gatekeeper blocks the binary with "developer cannot be verified".
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/monocle"]
          end

release:
  github:
    owner: josephschmitt
    name: monocle
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} v{{.Version}}"
  extra_files:
    - glob: build/skills.tar.gz
