name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Go version from devbox.json
        id: go-version
        run: |
          version=$(jq -r '.packages[] | select(startswith("go@")) | split("@")[1]' devbox.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Bundle MCP channel
        run: cd channel && bun install && bun run build.mjs

      # Wails version must match go.mod (github.com/wailsapp/wails/v2 v2.11.0)
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build arm64
        env:
          CGO_ENABLED: "1"
        run: |
          wails build -platform darwin/arm64 -ldflags "-X main.version=${{ steps.version.outputs.version }}"
          cp build/bin/monocle.app/Contents/MacOS/monocle monocle-arm64

      - name: Build amd64
        env:
          CGO_ENABLED: "1"
        run: |
          wails build -platform darwin/amd64 -ldflags "-X main.version=${{ steps.version.outputs.version }}"
          cp build/bin/monocle.app/Contents/MacOS/monocle monocle-amd64

      - name: Create universal binary
        run: |
          lipo -create monocle-arm64 monocle-amd64 -output monocle-universal
          chmod +x monocle-universal
          lipo -info monocle-universal

      - name: Assemble universal .app bundle
        run: |
          cp monocle-universal build/bin/monocle.app/Contents/MacOS/monocle

      - name: Create zip archive
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent \
            monocle.app \
            "../../Monocle-Desktop_${{ steps.version.outputs.version }}_darwin_universal.zip"

      - name: Wait for GitHub Release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Waiting for release ${TAG} to be created by GoReleaser..."
          for i in $(seq 1 60); do
            if gh release view "${TAG}" --json tagName -q .tagName 2>/dev/null; then
              echo "Release found!"
              exit 0
            fi
            echo "Attempt ${i}/60 — release not yet created, waiting 10s..."
            sleep 10
          done
          echo "ERROR: Timed out waiting for release ${TAG}"
          exit 1

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "Monocle-Desktop_${{ steps.version.outputs.version }}_darwin_universal.zip" \
            --clobber
