name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Go version from devbox.json
        id: go-version
        run: |
          version=$(jq -r '.packages[] | select(startswith("go@")) | split("@")[1]' devbox.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache: true

      - uses: oven-sh/setup-bun@v2

      # Wails version must match go.mod (github.com/wailsapp/wails/v2 v2.11.0)
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build desktop app
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p build && cp desktop/appicon.png build/appicon.png
          wails build -ldflags "-X main.version=${{ steps.version.outputs.version }}"

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Clean up certificate file
          rm $RUNNER_TEMP/certificate.p12

      - name: Code sign .app bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --deep --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            build/bin/monocle.app
          codesign --verify --verbose build/bin/monocle.app

      - name: Create zip for notarization
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent \
            monocle.app \
            "../../Monocle-Desktop_${{ steps.version.outputs.version }}_darwin_arm64.zip"

      - name: Notarize app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARIZATION_APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          xcrun notarytool submit \
            "Monocle-Desktop_${{ steps.version.outputs.version }}_darwin_arm64.zip" \
            --apple-id "$APPLE_NOTARIZATION_APPLE_ID" \
            --password "$APPLE_NOTARIZATION_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple build/bin/monocle.app

      - name: Re-create zip with stapled ticket
        run: |
          rm "Monocle-Desktop_${{ steps.version.outputs.version }}_darwin_arm64.zip"
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent \
            monocle.app \
            "../../Monocle-Desktop_${{ steps.version.outputs.version }}_darwin_arm64.zip"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Wait for GitHub Release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Waiting for release ${TAG} to be created by GoReleaser..."
          for i in $(seq 1 60); do
            if gh release view "${TAG}" --json tagName -q .tagName 2>/dev/null; then
              echo "Release found!"
              exit 0
            fi
            echo "Attempt ${i}/60 — release not yet created, waiting 10s..."
            sleep 10
          done
          echo "ERROR: Timed out waiting for release ${TAG}"
          exit 1

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "Monocle-Desktop_${{ steps.version.outputs.version }}_darwin_arm64.zip" \
            --clobber

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 "Monocle-Desktop_${VERSION}_darwin_arm64.zip" | awk '{print $1}')
          URL="https://github.com/josephschmitt/monocle/releases/download/${GITHUB_REF_NAME}/Monocle-Desktop_${VERSION}_darwin_arm64.zip"

          # Determine cask file: beta for prereleases, stable otherwise
          if [[ "$VERSION" == *-* ]]; then
            CASK_FILE="Casks/monocle-desktop@beta.rb"
          else
            CASK_FILE="Casks/monocle-desktop.rb"
          fi

          CASK_NAME="monocle-desktop"
          FORMULA_NAME="josephschmitt/tap/monocle"
          if [[ "$VERSION" == *-* ]]; then
            CASK_NAME="monocle-desktop@beta"
            FORMULA_NAME="josephschmitt/tap/monocle@beta"
          fi

          cat > /tmp/cask.rb <<CASK
          cask "${CASK_NAME}" do
            version "${VERSION}"
            sha256 "${SHA256}"
            url "${URL}"

            name "Monocle Desktop"
            desc "Code review companion for AI coding agents"
            homepage "https://github.com/josephschmitt/monocle"

            depends_on formula: "${FORMULA_NAME}"

            app "monocle.app"

            zap trash: [
              "~/Library/Application Support/com.wails.monocle",
            ]
          end
          CASK
          sed 's/^          //' /tmp/cask.rb > /tmp/cask-clean.rb

          # Push to homebrew-tap repo
          cd "$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/josephschmitt/homebrew-tap.git" .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p Casks
          cp /tmp/cask-clean.rb "$CASK_FILE"
          git add "$CASK_FILE"
          git commit -m "Update monocle-desktop cask to ${VERSION}" || exit 0
          git push
